<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Daily - AI 新闻日报</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">AI News Daily</h1>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索新闻...">
                    <button id="searchBtn">搜索</button>
                </div>
                <button class="weekly-btn" id="weeklyBtn">生成周报</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="date-bar">
            <span id="currentDate"></span>
            <a href="daily/" class="archive-link">历史日报</a>
        </div>

        <section class="category" id="cat1">
            <h2 class="category-title"><span class="icon">&#x1F9E0;</span> 板块一：大模型与基础技术</h2>
            <div class="news-grid" id="grid1"></div>
        </section>

        <section class="category" id="cat2">
            <h2 class="category-title"><span class="icon">&#x1F4F1;</span> 板块二：AI 应用与产品</h2>
            <div class="news-grid" id="grid2"></div>
        </section>

        <section class="category" id="cat3">
            <h2 class="category-title"><span class="icon">&#x1F4BB;</span> 板块三：芯片与算力</h2>
            <div class="news-grid" id="grid3"></div>
        </section>

        <section class="category" id="cat4">
            <h2 class="category-title"><span class="icon">&#x1F916;</span> 板块四：具身智能与机器人</h2>
            <div class="news-grid" id="grid4"></div>
        </section>
    </main>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <h2 id="modalTitle"></h2>
            <div class="modal-meta">
                <span id="modalSource"></span>
                <span id="modalDate"></span>
            </div>
            <p id="modalSummary"></p>
            <a id="modalLink" href="#" target="_blank">阅读原文</a>
        </div>
    </div>

    <div class="modal" id="weeklyModal">
        <div class="modal-content weekly-form">
            <button class="modal-close" id="weeklyClose">&times;</button>
            <h2>生成周报</h2>
            <div class="form-group">
                <label>开始日期</label>
                <input type="date" id="weekStart" min="2026-01-01">
            </div>
            <div class="form-group">
                <label>结束日期</label>
                <input type="date" id="weekEnd" min="2026-01-01">
            </div>
            <div class="form-group">
                <label>选择板块</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" value="1" checked> 大模型与基础技术</label>
                    <label><input type="checkbox" value="2" checked> AI 应用与产品</label>
                    <label><input type="checkbox" value="3" checked> 芯片与算力</label>
                    <label><input type="checkbox" value="4" checked> 具身智能与机器人</label>
                </div>
            </div>
            <div class="form-group">
                <label>每板块新闻数</label>
                <input type="number" id="weeklyCount" value="5" min="1" max="20">
            </div>
            <button class="submit-btn" id="weeklySubmit">生成周报</button>
            <div id="weeklyResult"></div>
        </div>
    </div>

    <footer>
        <p>AI News Daily &copy; 2026 | 数据来源：央视新闻、The Verge、TechCrunch、ArXiv 等</p>
    </footer>

    <script src="data/news.json" type="application/json"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
