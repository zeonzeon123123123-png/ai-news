<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Daily - AI 新闻日报</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">AI News Daily</h1>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索新闻...">
                    <button id="searchBtn">搜索</button>
                </div>
                <button class="weekly-btn" id="weeklyBtn">生成周报</button>
                <button class="ai-btn" id="aiSummaryBtn">AI 要点</button>
                <button class="settings-btn" id="settingsBtn" title="AI 模型设置">&#9881;</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="date-bar">
            <span id="currentDate"></span>
            <a href="daily/" class="archive-link">历史日报</a>
        </div>

        <div class="filter-bar">
            <button class="filter-tab active" data-cat="all">全部</button>
            <button class="filter-tab" data-cat="1">大模型</button>
            <button class="filter-tab" data-cat="2">AI 应用</button>
            <button class="filter-tab" data-cat="3">芯片算力</button>
            <button class="filter-tab" data-cat="4">具身智能</button>
        </div>

        <div class="ai-summary-box" id="aiSummaryBox" style="display:none;">
            <h3>AI 今日要点</h3>
            <div id="aiSummaryContent"></div>
        </div>

        <section class="category" id="cat1">
            <h2 class="category-title"><span class="icon">&#x1F9E0;</span> 大模型与基础技术<span class="cat-count" id="count1"></span></h2>
            <div class="news-list" id="grid1"></div>
        </section>

        <section class="category" id="cat2">
            <h2 class="category-title"><span class="icon">&#x1F4F1;</span> AI 应用与产品<span class="cat-count" id="count2"></span></h2>
            <div class="news-list" id="grid2"></div>
        </section>

        <section class="category" id="cat3">
            <h2 class="category-title"><span class="icon">&#x1F4BB;</span> 芯片与算力<span class="cat-count" id="count3"></span></h2>
            <div class="news-list" id="grid3"></div>
        </section>

        <section class="category" id="cat4">
            <h2 class="category-title"><span class="icon">&#x1F916;</span> 具身智能与机器人<span class="cat-count" id="count4"></span></h2>
            <div class="news-list" id="grid4"></div>
        </section>
    </main>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <h2 id="modalTitle"></h2>
            <div class="modal-meta">
                <span id="modalSource"></span>
                <span id="modalDate"></span>
            </div>
            <p id="modalSummary"></p>
            <a id="modalLink" href="#" target="_blank">阅读原文</a>
        </div>
    </div>

    <div class="modal" id="weeklyModal">
        <div class="modal-content weekly-form">
            <button class="modal-close" id="weeklyClose">&times;</button>
            <h2>生成周报</h2>
            <div class="form-group">
                <label>开始日期</label>
                <input type="date" id="weekStart">
            </div>
            <div class="form-group">
                <label>结束日期</label>
                <input type="date" id="weekEnd">
            </div>
            <div class="form-group">
                <label>选择板块</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" value="1" checked> 大模型与基础技术</label>
                    <label><input type="checkbox" value="2" checked> AI 应用与产品</label>
                    <label><input type="checkbox" value="3" checked> 芯片与算力</label>
                    <label><input type="checkbox" value="4" checked> 具身智能与机器人</label>
                </div>
            </div>
            <div class="form-group">
                <label>每板块新闻数</label>
                <input type="number" id="weeklyCount" value="5" min="1" max="20">
            </div>
            <button class="submit-btn" id="weeklySubmit">生成周报</button>
            <div id="weeklyResult"></div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content settings-form">
            <button class="modal-close" id="settingsClose">&times;</button>
            <h2>AI 模型设置</h2>
            <p class="settings-desc">配置 LLM 用于翻译和摘要生成，API Key 存储在浏览器本地。</p>
            <div class="form-group">
                <label>Provider</label>
                <select id="llmProvider">
                    <option value="openai">OpenAI</option>
                    <option value="gemini">Google Gemini</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="custom">自定义</option>
                </select>
            </div>
            <div class="form-group">
                <label>Model ID</label>
                <input type="text" id="llmModel" placeholder="gpt-4o-mini">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="llmApiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>Base URL</label>
                <input type="text" id="llmBaseUrl" placeholder="https://api.openai.com/v1">
            </div>
            <div class="settings-actions">
                <button class="submit-btn" id="settingsSave">保存配置</button>
                <button class="test-btn" id="settingsTest">测试连接</button>
            </div>
            <div id="settingsStatus"></div>
        </div>
    </div>

    <footer>
        <p>AI News Daily &copy; 2026 | 数据来源：TechCrunch、The Verge、IEEE Spectrum、Wired、36Kr 等</p>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
