name: Daily AI News Update

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    outputs:
      new_sha: ${{ steps.get_sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 deep-translator openai

      - name: Fetch and categorize news
        env:
          MAX_NEWS_PER_CATEGORY: "10"
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: python scripts/fetch_news.py

      - name: Check news data freshness
        run: |
          python -c "
          import json
          from datetime import datetime, timezone, timedelta
          with open('data/news.json') as f:
              data = json.load(f)
          date = data.get('date', '')
          today = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d')
          total = sum(len(data.get(f'category{i}', [])) for i in range(1, 5))
          empty_cats = [i for i in range(1, 5) if len(data.get(f'category{i}', [])) == 0]
          if date != today:
              print(f'WARNING: news.json date {date} != today {today}')
          if total < 5:
              print(f'ERROR: only {total} news items, possible fetch failure')
              exit(1)
          if empty_cats:
              print(f'WARNING: categories {empty_cats} are empty')
          "

      - name: Generate daily report
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: python scripts/generate_report.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Update news $(date +%Y-%m-%d)"
          git push

      - name: Get new commit SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily news fetch failed - ${new Date().toISOString().split('T')[0]}`,
              body: 'The daily news fetch workflow failed or produced insufficient data. Please check the [workflow logs](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions) for details.',
              labels: ['bug', 'automation']
            })

  deploy-pages:
    needs: fetch-and-update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.fetch-and-update.outputs.new_sha }}
      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/
          cp -r data _site/
          cp -r daily _site/
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4